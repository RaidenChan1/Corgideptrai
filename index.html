<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>x2HieuTrung was hereee</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 16px;
      color: #6b7280;
    }

    .top-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
      color: #374151;
    }

    select, input[type="number"] {
      border: 2px solid #d1d5db;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 15px;
      outline: none;
      min-width: 160px;
      background: #fff;
    }

    select:focus, input[type="number"]:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }

    textarea {
      width: 100%;
      height: 220px;
      resize: vertical;
      border: 2px solid #d1d5db;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }

    .bottom {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .count {
      font-weight: 700;
      font-size: 15px;
    }

    .count.limit {
      color: #dc2626;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      background: #2563eb;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .secondary {
      background: #6b7280;
    }

    .secondary:hover {
      background: #4b5563;
    }

    .note {
      margin-top: 10px;
      font-size: 14px;
      color: #dc2626;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>x2HieuTrung was hereee</h1>
    <p>hieu trung pro max</p>

    <div class="top-controls">
      <div class="field">
        <label for="presetLimit">Chọn nhanh</label>
        <select id="presetLimit">
          <option value="50">50 từ</option>
          <option value="100">100 từ</option>
          <option value="200">200 từ</option>
          <option value="custom">Tự nhập</option>
        </select>
      </div>

      <div class="field">
        <label for="customLimit">Giới hạn tùy chỉnh</label>
        <input id="customLimit" type="number" min="1" value="50" />
      </div>

      <div class="field">
        <button id="applyBtn">Áp dụng</button>
      </div>
    </div>

    <textarea id="textInput" placeholder="Nhập nội dung tại đây..."></textarea>

    <div class="bottom">
      <div id="count" class="count">0 / 50 từ</div>
      <div class="actions">
        <button id="clearBtn" class="secondary">Xóa</button>
      </div>
    </div>

    <div id="note" class="note"></div>
  </div>

  <script>
    const textInput = document.getElementById('textInput');
    const count = document.getElementById('count');
    const note = document.getElementById('note');
    const clearBtn = document.getElementById('clearBtn');
    const presetLimit = document.getElementById('presetLimit');
    const customLimit = document.getElementById('customLimit');
    const applyBtn = document.getElementById('applyBtn');

    let limit = 50;

    function getWords(text) {
      const trimmed = text.trim();
      if (!trimmed) return [];
      return trimmed.split(/\s+/);
    }

    function countWords(text) {
      return getWords(text).length;
    }

    function trimToWordLimit(text, maxWords) {
      const trimmedLeft = text.replace(/^\s+/, '');
      const words = trimmedLeft.match(/\S+/g) || [];

      if (words.length <= maxWords) return text;

      return words.slice(0, maxWords).join(' ');
    }

    function applyLimit(newLimit) {
      const parsed = Number(newLimit);

      if (!Number.isFinite(parsed) || parsed < 1) {
        note.textContent = 'Vui lòng nhập giới hạn lớn hơn 0.';
        return;
      }

      limit = Math.floor(parsed);

      if (countWords(textInput.value) > limit) {
        textInput.value = trimToWordLimit(textInput.value, limit);
      }

      customLimit.value = limit;
      updateUI();
    }

    function updateUI() {
      const totalWords = countWords(textInput.value);
      count.textContent = `${totalWords} / ${limit} từ`;

      if (totalWords >= limit) {
        count.classList.add('limit');
        note.textContent = `Đã đạt giới hạn ${limit} từ.`;
      } else {
        count.classList.remove('limit');
        note.textContent = '';
      }
    }

    textInput.addEventListener('input', () => {
      const words = countWords(textInput.value);

      if (words > limit) {
        textInput.value = trimToWordLimit(textInput.value, limit);
      }

      updateUI();
    });

    presetLimit.addEventListener('change', () => {
      if (presetLimit.value === 'custom') {
        customLimit.focus();
        return;
      }

      customLimit.value = presetLimit.value;
      applyLimit(presetLimit.value);
    });

    applyBtn.addEventListener('click', () => {
      presetLimit.value = 'custom';
      applyLimit(customLimit.value);
    });

    customLimit.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        presetLimit.value = 'custom';
        applyLimit(customLimit.value);
      }
    });

    clearBtn.addEventListener('click', () => {
      textInput.value = '';
      updateUI();
      textInput.focus();
    });

    applyLimit(50);
  </script>
</body>
</html>
