<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exec - File Share</title>
    <style>
        body {
            background-image: url('https://imgsrv.crunchyroll.com/cdn-cgi/image/fit=cover,format=auto,quality=85,width=1920/keyart/G9VHN9P49-backdrop_wide'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13, 17, 23, 0.7); 
            z-index: -1;
        }

        /* Login Modal */
        #login-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: #161b22;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #30363d;
            text-align: center;
            width: 300px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-login { background: #238636; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-skip { background: transparent; color: #8b949e; border: none; margin-top: 15px; cursor: pointer; text-decoration: underline; }

        /* Header & Content */
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #ffffff; font-size: 48px; margin: 0; text-shadow: 0px 0px 15px rgba(88, 166, 255, 0.6); }

        /* Admin Panel Area (Ẩn mặc định) */
        #admin-panel { 
            display: none; 
            background: rgba(31, 111, 235, 0.1);
            border: 1px dashed #1f6feb;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }

        .upload-area { display: flex; flex-direction: column; align-items: center; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: rgba(22, 27, 34, 0.9);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .card-header { display: flex; align-items: center; margin-bottom: 20px; }
        .icon { width: 48px; height: 48px; background-color: #21262d; border-radius: 8px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; text-transform: uppercase; border: 1px solid #30363d; }
        .title { font-size: 16px; font-weight: bold; color: #ffffff; margin: 0; word-break: break-all; }
        .info-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; color: #8b949e; }
        .status-online { color: #2ea043; font-weight: bold; }

        .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; margin-top: 20px; box-sizing: border-box; }
        .btn-download { background-color: #238636; color: #ffffff; }
        .btn-upload { background-color: #1f6feb; color: #ffffff; width: auto; padding: 12px 40px; font-size: 16px; }
        
        #upload-status { margin-top: 15px; font-size: 14px; color: #58a6ff; }
    </style>
</head>
<body>

    <div id="login-modal">
        <div class="login-box">
            <h2 style="margin-top:0">Login</h2>
            <input type="text" id="username" placeholder="Tên đăng nhập">
            <input type="password" id="password" placeholder="Mật khẩu">
            <button class="btn-login" onclick="checkLogin()">Accept</button>
            <button class="btn-skip" onclick="skipLogin()">Skip</button>
            <p id="login-error" style="color: #f85149; font-size: 12px; margin-top: 10px; display: none;">sai roi thang ngu</p>
        </div>
    </div>

    <div class="header">
        <h1>Exec</h1>
        <p style="color: #8b949e; margin-top: 5px;">Thai Tu Ugphone</p>
    </div>

    <div id="admin-panel">
        <h3 style="margin-top:0; color:#1f6feb">Admin Panel</h3>
        <div class="upload-area">
            <button class="btn btn-upload" id="fake-upload-btn">+ Up File</button>
            <input type="file" id="real-file-input" style="display: none;">
            <div id="upload-status"></div>
        </div>
    </div>

    <div class="grid-container" id="file-grid">
        <div class="card">
            <div class="card-header">
                <div class="icon">APK</div>
                <h2 class="title">Ugphone_Global.apk</h2>
            </div>
            <div class="info-row"><span>Dung lượng:</span><span style="color:#fff">45.2 MB</span></div>
            <div class="info-row"><span>Trạng thái:</span><span class="status-online">● Sẵn sàng</span></div>
            <div class="btn-group"><a href="#" class="btn btn-download">Tải Xuống</a></div>
        </div>
    </div>

    <script>
        // Cấu hình tài khoản
        const ADMIN_USER = "hieutrung";
        const ADMIN_PASS = "hieutrung";

        function checkLogin() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const errorMsg = document.getElementById("login-error");

            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                document.getElementById("login-modal").style.display = "none";
                document.getElementById("admin-panel").style.display = "block";
                alert("Hi Admin");
            } else {
                errorMsg.style.display = "block";
            }
        }

        function skipLogin() {
            document.getElementById("login-modal").style.display = "none";
            document.getElementById("admin-panel").style.display = "none";
        }

        // Logic Upload (Giống phiên bản trước)
        const realFileBtn = document.getElementById("real-file-input");
        const customBtn = document.getElementById("fake-upload-btn");
        const statusText = document.getElementById("upload-status");
        const fileGrid = document.getElementById("file-grid");

        if(customBtn) {
            customBtn.addEventListener("click", () => realFileBtn.click());
        }

        realFileBtn.addEventListener("change", function() {
            if (this.files && this.files[0]) {
                const file = this.files[0];
                const fileName = file.name;
                const fileSize = (file.size / 1024 / 1024).toFixed(2) + " MB";
                const dateNow = new Date().toLocaleDateString('vi-VN');
                const fileURL = URL.createObjectURL(file);

                statusText.innerHTML = "⚡ Đang xử lý file...";

                setTimeout(() => {
                    addNewCard(fileName, fileSize, dateNow, fileURL);
                    statusText.innerHTML = "✅ Đã up thành công: " + fileName;
                    this.value = ""; 
                }, 800);
            }
        });

        function addNewCard(name, size, date, url) {
            const newCard = document.createElement("div");
            newCard.className = "card";
            const ext = name.split('.').pop().substring(0, 3); 

            newCard.innerHTML = `
                <div class="card-header">
                    <div class="icon">${ext}</div>
                    <h2 class="title">${name}</h2>
                </div>
                <div class="info-row">
                    <span>Dung lượng:</span>
                    <span style="color:#fff">${size}</span>
                </div>
                <div class="info-row">
                    <span>Trạng thái:</span>
                    <span class="status-online">● Sẵn sàng</span>
                </div>
                <div class="info-row">
                    <span>Ngày thêm:</span>
                    <span style="color:#fff">${date}</span>
                </div>
                <a href="${url}" download="${name}" class="btn btn-download">Tải Xuống</a>
            `;
            fileGrid.insertBefore(newCard, fileGrid.firstChild);
        }
    </script>
</body>
</html>
